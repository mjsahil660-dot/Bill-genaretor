<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Nova - Order Form Pro</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .header-title { text-align: center; color: #166534; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-bottom: 15px; }
        .nav-menu { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .nav-btn.active { background: #2ecc71; color: white; }
        .section-title { background: #f8f9fa; padding: 5px 10px; margin: 15px 0 10px; font-weight: bold; color: #27ae60; border-radius: 5px; font-size: 13px; border-left: 4px solid #2ecc71; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 12px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .main-btn { width: 100%; padding: 15px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #adminPanel, #loginSection { display: none; }
        .jersey-item { background: #f1f1f1; padding: 10px; border-radius: 8px; margin-bottom: 10px; position: relative; }

        /* PRINT CSS - FIXED WHITE PAGE */
        #invoice-box { display: none; }
        @media print {
            body { background: white; padding: 0; }
            .card { display: none !important; }
            #invoice-box { 
                display: block !important; 
                width: 100%; 
                padding: 40px;
                box-sizing: border-box;
                color: #000;
            }
        }

        /* Invoice Design */
        .inv-head { display: flex; justify-content: space-between; border-bottom: 3px solid #2ecc71; padding-bottom: 10px; }
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .inv-table th { background: #f2f2f2; text-align: left; padding: 10px; border: 1px solid #ddd; }
        .inv-table td { padding: 10px; border: 1px solid #ddd; }
        .inv-total { float: right; width: 200px; margin-top: 20px; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 class="header-title">Jersey Nova Admin</h2>
    <div style="text-align:right;"><small onclick="showLogin()" style="color:#ccc; cursor:pointer;">Admin Login</small></div>

    <div id="loginSection">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="checkPassword()" style="width:100%; padding:8px; background:#333; color:white; border-radius:8px;">Login</button>
    </div>

    <div id="adminPanel">
        <div class="nav-menu">
            <button id="btn-bill" class="nav-btn active" onclick="showTab('bill')">বিল জেনারেটর</button>
            <button id="btn-calc" class="nav-btn" onclick="showTab('calc')">হিসাব ও লাভ</button>
        </div>
        <div id="bill">
             <label>কাস্টমারের নাম</label><input type="text" id="b_name" placeholder="Name">
             <label>ফোন নাম্বার</label><input type="text" id="b_phone" placeholder="Phone">
             <label>বিক্রয় মূল্য (৳)</label><input type="number" id="b_price" oninput="calcBill()">
             <label>ফ্যাক্টরি রেট (কেনা দাম)</label><input type="number" id="b_factory">
             <label>কোয়ান্টিটি</label><input type="number" id="b_qty" value="1" oninput="calcBill()">
             <label>ডেলিভারি</label><input type="number" id="b_delivery" value="80" oninput="calcBill()">
             <label>অ্যাডভান্স</label><input type="number" id="b_advance" value="0" oninput="calcBill()">
             
             <button class="main-btn" style="background:#2ecc71;" onclick="saveToHistory()">হিসাবে যোগ করুন</button>
             <button class="main-btn" style="background:#4f46e5;" onclick="printInvoice()">প্রিন্ট ইনভয়েস (PDF)</button>

             <div id="billOutput" style="display:none;"><div id="billResult" style="padding:10px; border:1px dashed #777; margin-top:10px; white-space:pre-wrap; background: #fff;"></div></div>
        </div>
        
        <div id="calc" style="display:none;">
            <div id="stats" style="background:#e8f5e9; padding:15px; border-radius:8px; margin-bottom: 10px;">
                <div>মোট বিক্রি: <span id="totalSales">0</span>৳</div>
                <div style="color: #c0392b;">ফ্যাক্টরি বিল: <span id="totalFactory">0</span>৳</div>
                <hr>
                <div style="font-weight: bold; color: #27ae60;">নিট লাভ: <span id="netProfit">0</span>৳</div>
            </div>
            <button onclick="clearHistory()" style="color:red; background:none; border:none; cursor:pointer;">মুছে ফেলুন</button>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="customerForm">
        <!-- Customer Details (Existing Code) -->
        <div class="section-title">অর্ডার ডিটেইলস</div>
        <input type="text" id="f_name" placeholder="আপনার নাম">
        <input type="text" id="f_phone" placeholder="ফোন নাম্বার">
        <div id="jerseyContainer">
            <div class="jersey-item">
                <input type="text" class="j_name" placeholder="জার্সির নাম ও সাইজ">
            </div>
        </div>
        <button class="main-btn" onclick="submitToWA()">WhatsApp-এ অর্ডার পাঠান</button>
    </div>
</div>

<!-- INVOICE FOR PRINTING -->
<div id="invoice-box">
    <div class="inv-head">
        <div>
            <h1 style="margin:0; color:#166534;">JERSEY NOVA</h1>
            <p>যাত্রাবাড়ী, ঢাকা। ফোন: 01907966882</p>
        </div>
        <div style="text-align:right;">
            <h2>INVOICE</h2>
            <p id="inv-date"></p>
        </div>
    </div>
    <div style="margin-top:20px;">
        <strong>BILL TO:</strong>
        <p id="inv-cust-name" style="margin:5px 0;"></p>
        <p id="inv-cust-phone" style="margin:0;"></p>
    </div>
    <table class="inv-table">
        <thead>
            <tr><th>Item Description</th><th>Qty</th><th>Price</th><th>Total</th></tr>
        </thead>
        <tbody>
            <tr>
                <td>Premium Customized Jersey</td>
                <td id="inv-qty"></td>
                <td id="inv-price"></td>
                <td id="inv-sub"></td>
            </tr>
        </tbody>
    </table>
    <div class="inv-total">
        <div class="total-row"><span>Sub-total:</span><span id="sum"></span></div>
        <div class="total-row"><span>Delivery:</span><span id="del"></span></div>
        <div class="total-row" style="font-weight:bold; border-top:1px solid #000;"><span>Total:</span><span id="grand"></span></div>
        <div class="total-row" style="color:green;"><span>Paid:</span><span id="paid"></span></div>
        <div class="total-row" style="color:red; font-weight:bold;"><span>Due:</span><span id="due"></span></div>
    </div>
</div>

<script>
    const PASS = "sahil882";
    function showLogin() { document.getElementById('loginSection').style.display = 'block'; }
    function checkPassword() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('customerForm').style.display = 'none';
            document.getElementById('loginSection').style.display = 'none';
        } else { alert("Wrong Password!"); }
    }
    function showTab(t) {
        document.getElementById('bill').style.display = t=='bill'?'block':'none';
        document.getElementById('calc').style.display = t=='calc'?'block':'none';
        document.getElementById('btn-bill').classList.toggle('active', t=='bill');
        document.getElementById('btn-calc').classList.toggle('active', t=='calc');
    }

    function calcBill() {
        const p=parseInt(document.getElementById('b_price').value)||0, q=parseInt(document.getElementById('b_qty').value)||1, d=parseInt(document.getElementById('b_delivery').value)||0, a=parseInt(document.getElementById('b_advance').value)||0;
        if(p>0){
            document.getElementById('billOutput').style.display='block'; 
            document.getElementById('billResult').innerText=`অর্ডার সামারি:\nমোট টাকা: ${p*q+d}৳\nঅ্যাডভান্স: ${a}৳\nবাকি: ${p*q+d-a}৳`;
        }
    }

    function printInvoice() {
        const name = document.getElementById('b_name').value || "Customer";
        const phone = document.getElementById('b_phone').value || "N/A";
        const p=parseInt(document.getElementById('b_price').value)||0, q=parseInt(document.getElementById('b_qty').value)||1, d=parseInt(document.getElementById('b_delivery').value)||0, a=parseInt(document.getElementById('b_advance').value)||0;

        if(p==0) { alert("Please enter price!"); return; }

        document.getElementById('inv-date').innerText = "Date: " + new Date().toLocaleDateString();
        document.getElementById('inv-cust-name').innerText = name;
        document.getElementById('inv-cust-phone').innerText = "Phone: " + phone;
        document.getElementById('inv-qty').innerText = q;
        document.getElementById('inv-price').innerText = "৳" + p;
        document.getElementById('inv-sub').innerText = "৳" + (p*q);
        document.getElementById('sum').innerText = "৳" + (p*q);
        document.getElementById('del').innerText = "৳" + d;
        document.getElementById('grand').innerText = "৳" + (p*q+d);
        document.getElementById('paid').innerText = "৳" + a;
        document.getElementById('due').innerText = "৳" + (p*q+d-a);

        window.print();
    }

    let history = JSON.parse(localStorage.getItem('jn_history_v2') || '[]');
    function saveToHistory() {
        const p=parseInt(document.getElementById('b_price').value)||0, f=parseInt(document.getElementById('b_factory').value)||0, q=parseInt(document.getElementById('b_qty').value)||1;
        if(p>0){
            history.push({ date: new Date().toLocaleDateString(), sale: p*q, cost: f*q });
            localStorage.setItem('jn_history_v2', JSON.stringify(history));
            alert("Saved!");
            updateHistory();
        }
    }

    function updateHistory() {
        let ts=0, tf=0; document.getElementById('historyList').innerHTML="";
        history.forEach(i => { ts+=i.sale; tf+=i.cost; document.getElementById('historyList').innerHTML+=`<div>${i.date} - ${i.sale}৳</div>`; });
        document.getElementById('totalSales').innerText=ts; document.getElementById('totalFactory').innerText=tf; document.getElementById('netProfit').innerText=ts-tf;
    }
    updateHistory();
    function clearHistory() { if(confirm("Clear all?")) { history=[]; localStorage.removeItem('jn_history_v2'); updateHistory(); } }
</script>
</body>
</html>
