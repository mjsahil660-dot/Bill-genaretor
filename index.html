<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Nova Professional Bill Tool</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
        .section-title { background: #f8f9fa; padding: 5px 10px; margin-top: 15px; font-weight: bold; color: #27ae60; border-radius: 5px; }
        label { display: block; margin: 10px 0 5px; font-size: 13px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #27ae60; }
        #mainContent { display: none; }
        .output-box { background: #fffbe6; padding: 15px; border: 1px dashed #f1c40f; border-radius: 8px; white-space: pre-wrap; margin-top: 20px; font-size: 14px; line-height: 1.5; color: #333; }
        .copy-btn { background: #3498db; }
    </style>
</head>
<body>

<div id="loginSection" class="card">
    <h2>Jersey Nova Admin 🔒</h2>
    <input type="password" id="passInput" placeholder="পাসওয়ার্ড লিখুন">
    <button onclick="checkPassword()">টুল ওপেন করুন</button>
</div>

<div id="mainContent" class="card">
    <h2>Jersey Nova Billing ⚽</h2>

    <div class="section-title">💰 পেমেন্ট ও ক্যালকুলেশন</div>
    <div class="grid">
        <div>
            <label>প্রাইস (১টির দাম)</label>
            <input type="number" id="price" placeholder="450" oninput="calculate()">
        </div>
        <div>
            <label>জার্সি (পিস)</label>
            <input type="number" id="q_jersey" value="1" oninput="calculate()">
        </div>
    </div>
    <div class="grid">
        <div>
            <label>প্যান্ট (পিস)</label>
            <input type="number" id="q_pant" value="0" oninput="calculate()">
        </div>
        <div>
            <label>ডেলিভারি চার্জ</label>
            <input type="number" id="delivery" value="80" oninput="calculate()">
        </div>
    </div>
    <label>অ্যাডভান্স পে (৳)</label>
    <input type="number" id="advance" placeholder="200" oninput="calculate()">

    <div class="section-title">👤 কাস্টমার ইনফো</div>
    <div class="grid">
        <input type="text" id="c_name" placeholder="কাস্টমারের নাম">
        <input type="text" id="c_phone" placeholder="ফোন নাম্বার">
    </div>

    <div class="section-title">👕 জার্সির ডিটেইলস</div>
    <div class="grid">
        <input type="text" id="j_name" placeholder="পিছনের নাম">
        <input type="text" id="j_num" placeholder="জার্সি নাম্বার">
    </div>
    <div class="grid">
        <input type="text" id="j_size" placeholder="সাইজ (M,L,XL)">
        <select id="j_hata">
            <option value="হাফ হাতা">হাফ হাতা</option>
            <option value="ফুল হাতা">ফুল হাতা</option>
        </select>
    </div>

    <div class="section-title">📍 ঠিকানা</div>
    <div class="grid">
        <input type="text" id="dist" placeholder="জেলা">
        <input type="text" id="thana" placeholder="থানা">
    </div>
    <textarea id="area" placeholder="এলাকা/মহল্লা/বাসা নং" rows="2" style="margin-top:10px"></textarea>

    <div id="outputContainer" style="display:none;">
        <div class="output-box" id="resultText"></div>
        <button class="copy-btn" onclick="copyText()">অর্ডার মেসেজ কপি করুন</button>
    </div>
</div>

<script>
    const MY_PASSWORD = "sahil882";

    function checkPassword() {
        if(document.getElementById('passInput').value === MY_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function calculate() {
        const price = parseInt(document.getElementById('price').value) || 0;
        const qJ = parseInt(document.getElementById('q_jersey').value) || 0;
        const qP = parseInt(document.getElementById('q_pant').value) || 0;
        const delivery = parseInt(document.getElementById('delivery').value) || 0;
        const advance = parseInt(document.getElementById('advance').value) || 0;

        const total = (price * qJ) + delivery;
        const due = total - advance;

        if(price > 0) {
            document.getElementById('outputContainer').style.display = 'block';
            
            let msg = `📝 অর্ডার কনফার্ম করার জন্য নিচের নম্বর এ অ্যাডভান্স করে ফ্রম টি ফিল আপ করুন অথবা স্ক্রিনশট দিন।\nBkash/Nagad: 01907966882\n\n`;
            msg += `◈ কত পিস জার্সি - ${qJ}\n`;
            msg += `◈ কত পিস প্যান্ট - ${qP}\n`;
            msg += `◈ আপনার নাম - ${document.getElementById('c_name').value}\n`;
            msg += `◈ ফোন নাম্বার - ${document.getElementById('c_phone').value}\n\n`;
            msg += `◈ জার্সির পিছনের নাম - ${document.getElementById('j_name').value}\n`;
            msg += `◈ জার্সির নাম্বার - ${document.getElementById('j_num').value}\n`;
            msg += `◈ সাইজ - ${document.getElementById('j_size').value}\n`;
            msg += `◈ হাতার ধরণ - ${document.getElementById('j_hata').value}\n\n`;
            msg += `◈ জেলা - ${document.getElementById('dist').value}\n`;
            msg += `◈ থানা - ${document.getElementById('thana').value}\n`;
            msg += `◈ এলাকা - ${document.getElementById('area').value}\n\n`;
            msg += `💰 বিল সামারি:\n• মোট বিল - ${total}৳\n• অ্যাডভান্স - ${advance}৳\n• বাকি (Due) - ${due}৳\n\nধন্যবাদ, Jersey Nova-র সাথে থাকার জন্য। ❤️`;
            
            document.getElementById('resultText').innerText = msg;
        }
    }

    function copyText() {
        const text = document.getElementById('resultText').innerText;
        navigator.clipboard.writeText(text).then(() => alert("পুরো অর্ডার ফরমটি কপি হয়েছে!"));
    }
</script>

</body>
</html>
