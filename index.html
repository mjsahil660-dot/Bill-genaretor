<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Nova Customer Care</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .header-title { text-align: center; color: #166534; margin-bottom: 15px; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
        #loginSection { text-align: center; margin-top: 50px; }
        .nav-menu { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { flex: 1; padding: 8px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .nav-btn.active { background: #2ecc71; color: white; }
        .section-title { background: #f8f9fa; padding: 5px 10px; margin: 15px 0 10px; font-weight: bold; color: #27ae60; border-radius: 5px; font-size: 13px; border-left: 4px solid #2ecc71; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 12px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.main-btn { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .output-box { background: #fffbe6; padding: 15px; border: 1px dashed #f1c40f; border-radius: 8px; white-space: pre-wrap; margin-top: 15px; font-size: 13px; line-height: 1.6; color: #333; }
        #mainContainer, .tab-content { display: none; }
        .tab-content.active { display: block; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 13px; }
    </style>
</head>
<body>

<div id="loginSection" class="card">
    <h2>Jersey Nova Admin 🔒</h2>
    <input type="password" id="passInput" placeholder="Password">
    <button class="main-btn" onclick="checkPassword()">Login</button>
</div>

<div id="mainContainer" class="card">
    <h2 class="header-title">Jersey Nova Customer Care</h2>
    
    <div class="nav-menu">
        <button id="btn-bill" class="nav-btn active" onclick="showTab('bill')">বিল জেনারেটর</button>
        <button id="btn-form" class="nav-btn" onclick="showTab('form')">অর্ডার ফর্ম</button>
        <button id="btn-calc" class="nav-btn" onclick="showTab('calc')">মাসিক হিসাব</button>
    </div>

    <div id="bill" class="tab-content active">
        <label>প্রাইস (৳)</label><input type="number" id="b_price" oninput="calcBill()">
        <label>কোয়ান্টিটি</label><input type="number" id="b_qty" value="1" oninput="calcBill()">
        <label>ডেলিভারি</label><input type="number" id="b_delivery" value="80" oninput="calcBill()">
        <label>অ্যাডভান্স</label><input type="number" id="b_advance" value="0" oninput="calcBill()">
        <button class="main-btn" onclick="saveToHistory()">হিসাবে যোগ করুন</button>
        <div id="billOutput" style="display:none;"><div class="output-box" id="billResult"></div><button class="main-btn" style="background:#3498db; margin-top:5px;" onclick="copyText('billResult')">কপি করুন</button></div>
    </div>

    <div id="form" class="tab-content">
        <div class="grid">
            <input type="text" id="f_name" placeholder="নাম">
            <input type="text" id="f_phone" placeholder="ফোন">
        </div>
        <div class="grid">
            <input type="text" id="f_jname" placeholder="পিছনের নাম">
            <input type="text" id="f_jnum" placeholder="নাম্বার">
        </div>
        <textarea id="f_note" placeholder="নোট (লোগো/ডিজাইন)" rows="2"></textarea>
        <button class="main-btn" onclick="genForm()">অর্ডার ফর্ম তৈরি করুন</button>
        <div id="formOutput" style="display:none;"><div class="output-box" id="formResult"></div><button class="main-btn" style="background:#3498db; margin-top:5px;" onclick="copyText('formResult')">কপি করুন</button></div>
    </div>

    <div id="calc" class="tab-content">
        <div class="section-title">চলতি মাসের হিসাব</div>
        <div id="stats" style="background:#e8f5e9; padding:10px; border-radius:8px; margin-bottom:10px;">
            <b>মোট বিক্রি: <span id="totalSales">0</span>৳</b><br>
            <b>মোট অর্ডার: <span id="orderCount">0</span>টি</b>
        </div>
        <button onclick="clearHistory()" style="background:#ff7675; color:white; border:none; padding:5px; border-radius:5px; font-size:10px; cursor:pointer;">হিসাব রিসেট করুন</button>
        <div id="historyList" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
    </div>
</div>

<script>
    const PASS = "sahil882";
    let history = JSON.parse(localStorage.getItem('jn_history') || '[]');

    function checkPassword() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            updateHistoryUI();
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    }

    function calcBill() {
        const p = parseInt(document.getElementById('b_price').value) || 0;
        const q = parseInt(document.getElementById('b_qty').value) || 1;
        const d = parseInt(document.getElementById('b_delivery').value) || 0;
        const a = parseInt(document.getElementById('b_advance').value) || 0;
        const total = (p * q) + d;
        if(p > 0) {
            document.getElementById('billOutput').style.display = 'block';
            document.getElementById('billResult').innerText = `অর্ডার কনফার্ম! Jersey Nova\nমোট বিল: ${total}৳\nঅ্যাডভান্স: ${a}৳\nবাকি: ${total-a}৳`;
        }
    }

    function saveToHistory() {
        const p = parseInt(document.getElementById('b_price').value) || 0;
        const q = parseInt(document.getElementById('b_qty').value) || 1;
        if(p > 0) {
            const sale = { date: new Date().toLocaleDateString(), amount: p * q };
            history.push(sale);
            localStorage.setItem('jn_history', JSON.stringify(history));
            updateHistoryUI();
            alert("হিসাবে যোগ করা হয়েছে!");
        }
    }

    function updateHistoryUI() {
        const list = document.getElementById('historyList');
        const totalSales = document.getElementById('totalSales');
        const orderCount = document.getElementById('orderCount');
        list.innerHTML = "";
        let total = 0;
        history.forEach((item, index) => {
            total += item.amount;
            list.innerHTML += `<div class="history-item">${item.date} - ${item.amount}৳</div>`;
        });
        totalSales.innerText = total;
        orderCount.innerText = history.length;
    }

    function clearHistory() {
        if(confirm("সব হিসাব মুছে ফেলতে চান?")) {
            history = [];
            localStorage.setItem('jn_history', '[]');
            updateHistoryUI();
        }
    }

    function genForm() {
        document.getElementById('formOutput').style.display = 'block';
        document.getElementById('formResult').innerText = `📝 জার্সি নোভা কাস্টমার কেয়ার\nনাম: ${document.getElementById('f_name').value}\nফোন: ${document.getElementById('f_phone').value}\nনোট: ${document.getElementById('f_note').value}`;
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => alert("কপি হয়েছে!"));
    }
</script>
</body>
</html>
