<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Nova - Order Form Pro</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .header-title { text-align: center; color: #166534; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-bottom: 15px; }
        .nav-menu { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .nav-btn.active { background: #2ecc71; color: white; }
        .section-title { background: #f8f9fa; padding: 5px 10px; margin: 15px 0 10px; font-weight: bold; color: #27ae60; border-radius: 5px; font-size: 13px; border-left: 4px solid #2ecc71; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 12px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .main-btn { width: 100%; padding: 15px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #adminPanel, #loginSection { display: none; }
        .customer-notice { font-size: 12px; background: #fffbe6; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffe58f; }
        .jersey-item { background: #f1f1f1; padding: 10px; border-radius: 8px; margin-bottom: 10px; position: relative; }
    </style>
</head>
<body>

<div class="card">
    <h2 class="header-title">Jersey Nova Customer Care</h2>
    
    <div style="text-align:right;"><small id="adminLink" onclick="showLogin()" style="color:#ccc; cursor:pointer;">Admin Login</small></div>

    <div id="loginSection">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="checkPassword()" style="width:100%; padding:8px; background:#333; color:white; border-radius:8px;">Login</button>
    </div>

    <div id="adminPanel">
        <div class="nav-menu">
            <button id="btn-bill" class="nav-btn active" onclick="showTab('bill')">বিল জেনারেটর</button>
            <button id="btn-calc" class="nav-btn" onclick="showTab('calc')">হিসাব ও লাভ</button>
        </div>
        <div id="bill" class="tab-content active">
             <label>বিক্রয় মূল্য (৳)</label><input type="number" id="b_price" oninput="calcBill()">
             <label>ফ্যাক্টরি রেট (কেনা দাম ৳)</label><input type="number" id="b_factory" placeholder="প্রতি পিস কত খরচ?">
             <label>কোয়ান্টিটি</label><input type="number" id="b_qty" value="1" oninput="calcBill()">
             <label>ডেলিভারি</label><input type="number" id="b_delivery" value="80" oninput="calcBill()">
             <label>অ্যাডভান্স</label><input type="number" id="b_advance" value="0" oninput="calcBill()">
             <button class="main-btn" style="background:#2ecc71;" onclick="saveToHistory()">হিসাবে যোগ করুন & রিসেট</button>
             <div id="billOutput" style="display:none;"><div id="billResult" style="padding:10px; border:1px dashed #777; margin-top:10px; white-space:pre-wrap; background: #fff;"></div></div>
        </div>
        <div id="calc" class="tab-content" style="display:none;">
            <div id="stats" style="background:#e8f5e9; padding:15px; border-radius:8px; margin-bottom: 10px;">
                <div>মোট বিক্রি: <span id="totalSales">0</span>৳</div>
                <div style="color: #c0392b;">ফ্যাক্টরি বিল: <span id="totalFactory">0</span>৳</div>
                <hr>
                <div style="font-weight: bold; color: #27ae60;">নিট লাভ: <span id="netProfit">0</span>৳</div>
            </div>
            <button onclick="clearHistory()" style="font-size:10px; background:none; border:none; color:red; cursor:pointer;">হিস্টোরি মুছুন</button>
            <div id="historyList" style="margin-top:10px; font-size: 12px;"></div>
        </div>
    </div>

    <div id="customerForm">
        <div class="customer-notice">
            📝 <b>টিম অর্ডার:</b> একাধিক জার্সি হলে 'Add More' বাটনে ক্লিক করে সবার ডিটেইলস লিখুন।
        </div>

        <div class="section-title">পেমেন্ট ডিটেইলস (বিকাশ/নগদ: 01907966882)</div>
        <div class="grid">
            <select id="f_method">
                <option value="বিকাশ">বিকাশ</option>
                <option value="নগদ">নগদ</option>
            </select>
            <input type="text" id="f_lastDigits" placeholder="লাস্ট ৩ ডিজিট বা নাম">
        </div>
        
        <div class="grid">
            <input type="text" id="f_name" placeholder="আপনার নাম">
            <input type="text" id="f_phone" placeholder="ফোন নাম্বার">
        </div>

        <div class="section-title">ডিজাইন ও সাইজ ডিটেইলস</div>
        <div id="jerseyContainer">
            <div class="jersey-item">
                <div class="grid">
                    <input type="text" class="j_name" placeholder="নাম (Tahsan)">
                    <input type="text" class="j_num" placeholder="নাম্বার (10)">
                </div>
                <div class="grid">
                    <input type="text" class="j_size" placeholder="সাইজ (M/L/XL)">
                    <input type="text" class="j_hata" placeholder="হাফ/ফুল হাতা">
                </div>
            </div>
        </div>
        <button type="button" onclick="addJerseyField()" style="background:#3498db; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-size:12px;">+ Add More Jersey (টিম অর্ডার)</button>

        <div class="section-title">ঠিকানা ও নোট</div>
        <div class="grid">
            <input type="text" id="f_dist" placeholder="জেলা">
            <input type="text" id="f_thana" placeholder="থানা">
        </div>
        <input type="text" id="f_area" placeholder="এলাকা/মহল্লা">
        <textarea id="f_note" placeholder="অতিরিক্ত নোট..." rows="2"></textarea>
        
        <button class="main-btn" onclick="submitToWA()">WhatsApp-এ অর্ডার পাঠান 🚀</button>
    </div>
</div>

<script>
    const MY_PHONE = "8801907966882";
    const PASS = "sahil882";

    function showLogin() { document.getElementById('loginSection').style.display = 'block'; }

    function checkPassword() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('customerForm').style.display = 'none';
            document.getElementById('loginSection').style.display = 'none';
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function showTab(t) {
        document.getElementById('bill').style.display = t=='bill'?'block':'none';
        document.getElementById('calc').style.display = t=='calc'?'block':'none';
        document.getElementById('btn-bill').className = t=='bill'?'nav-btn active':'nav-btn';
        document.getElementById('btn-calc').className = t=='calc'?'nav-btn active':'nav-btn';
    }

    function addJerseyField() {
        const div = document.createElement('div');
        div.className = 'jersey-item';
        div.innerHTML = `<div class="grid"><input type="text" class="j_name" placeholder="নাম"><input type="text" class="j_num" placeholder="নাম্বার"></div><div class="grid"><input type="text" class="j_size" placeholder="সাইজ"><input type="text" class="j_hata" placeholder="হাফ/ফুল হাতা"></div>`;
        document.getElementById('jerseyContainer').appendChild(div);
    }

    function submitToWA() {
        let msg = `📝 *নতুন অর্ডার ফর্ম*\n\n`;
        msg += `💰 *পেমেন্ট:* ${document.getElementById('f_method').value} (লাস্ট: ${document.getElementById('f_lastDigits').value})\n\n`;
        msg += `👤 *কাস্টমার:* ${document.getElementById('f_name').value}\n`;
        msg += `📞 *ফোন:* ${document.getElementById('f_phone').value}\n\n`;
        
        msg += `👕 *জার্সি ডিটেইলস:*\n`;
        const names = document.querySelectorAll('.j_name');
        const nums = document.querySelectorAll('.j_num');
        const sizes = document.querySelectorAll('.j_size');
        const hatas = document.querySelectorAll('.j_hata');
        
        names.forEach((n, i) => {
            if(n.value) msg += `${i+1}. ${n.value}-${nums[i].value}-${sizes[i].value}-${hatas[i].value}\n`;
        });

        msg += `\n📍 *ঠিকানা:* ${document.getElementById('f_dist').value}, ${document.getElementById('f_thana').value}, ${document.getElementById('f_area').value}\n`;
        msg += `📝 *নোট:* ${document.getElementById('f_note').value}`;
        
        window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    let history = JSON.parse(localStorage.getItem('jn_history_v2') || '[]');
    
    function calcBill() {
        const p=parseInt(document.getElementById('b_price').value)||0, q=parseInt(document.getElementById('b_qty').value)||1, d=parseInt(document.getElementById('b_delivery').value)||0, a=parseInt(document.getElementById('b_advance').value)||0;
        if(p>0){
            document.getElementById('billOutput').style.display='block'; 
            document.getElementById('billResult').innerText=`অর্ডার কনফার্ম!\nমোট: ${p*q+d}৳\nঅ্যাডভান্স: ${a}৳\nবাকি: ${p*q+d-a}৳`;
        }
    }

    function saveToHistory() {
        const p=parseInt(document.getElementById('b_price').value)||0;
        const f=parseInt(document.getElementById('b_factory').value)||0;
        const q=parseInt(document.getElementById('b_qty').value)||1;
        
        if(p>0){
            history.push({
                date: new Date().toLocaleDateString(), 
                sale: p*q, 
                cost: f*q
            }); 
            localStorage.setItem('jn_history_v2', JSON.stringify(history)); 
            alert("হিসাব সেভ হয়েছে এবং ক্লিয়ার করা হয়েছে!"); 
            
            // ফিল্ড রিসেট করা
            document.getElementById('b_price').value = "";
            document.getElementById('b_factory').value = "";
            document.getElementById('b_qty').value = "1";
            document.getElementById('b_advance').value = "0";
            document.getElementById('billOutput').style.display = 'none';
            
            updateHistory();
        }
    }

    function updateHistory() {
        let totalS=0, totalC=0; 
        document.getElementById('historyList').innerHTML="";
        history.forEach(i=>{
            totalS += i.sale; 
            totalC += i.cost;
            document.getElementById('historyList').innerHTML+=`<div>${i.date} - সেল: ${i.sale}৳ (লাভ: ${i.sale - i.cost}৳)</div>`;
        });
        document.getElementById('totalSales').innerText = totalS;
        document.getElementById('totalFactory').innerText = totalC;
        document.getElementById('netProfit').innerText = (totalS - totalC);
    }

    function clearHistory() { if(confirm("সব হিসাব মুছে ফেলবেন?")) { history=[]; localStorage.removeItem('jn_history_v2'); updateHistory(); } }
    
    updateHistory();
</script>
</body>
</html>
