<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Nova - Order Form</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .header-title { text-align: center; color: #166534; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-bottom: 15px; }
        .nav-menu { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .nav-btn.active { background: #2ecc71; color: white; }
        .section-title { background: #f8f9fa; padding: 5px 10px; margin: 15px 0 10px; font-weight: bold; color: #27ae60; border-radius: 5px; font-size: 13px; border-left: 4px solid #2ecc71; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 12px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .main-btn { width: 100%; padding: 15px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #adminPanel, #loginSection { display: none; }
        .customer-notice { font-size: 12px; background: #fffbe6; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffe58f; }
    </style>
</head>
<body>

<div class="card">
    <h2 class="header-title">Jersey Nova Customer Care</h2>
    
    <div style="text-align:right;"><small id="adminLink" onclick="showLogin()" style="color:#ccc; cursor:pointer;">Admin Login</small></div>

    <div id="loginSection">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="checkPassword()" style="width:100%; padding:8px; background:#333; color:white; border-radius:8px;">Login</button>
    </div>

    <div id="adminPanel">
        <div class="nav-menu">
            <button id="btn-bill" class="nav-btn active" onclick="showTab('bill')">বিল জেনারেটর</button>
            <button id="btn-calc" class="nav-btn" onclick="showTab('calc')">মাসিক হিসাব</button>
        </div>
        <div id="bill" class="tab-content active">
             <label>প্রাইস (৳)</label><input type="number" id="b_price" oninput="calcBill()">
             <label>কোয়ান্টিটি</label><input type="number" id="b_qty" value="1" oninput="calcBill()">
             <label>ডেলিভারি</label><input type="number" id="b_delivery" value="80" oninput="calcBill()">
             <label>অ্যাডভান্স</label><input type="number" id="b_advance" value="0" oninput="calcBill()">
             <button class="main-btn" style="background:#2ecc71;" onclick="saveToHistory()">হিসাবে যোগ করুন</button>
             <div id="billOutput" style="display:none;"><div id="billResult" style="padding:10px; border:1px dashed #777; margin-top:10px; white-space:pre-wrap;"></div></div>
        </div>
        <div id="calc" class="tab-content" style="display:none;">
            <div id="stats" style="background:#e8f5e9; padding:10px; border-radius:8px;">মোট বিক্রি: <span id="totalSales">0</span>৳</div>
            <div id="historyList" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="customerForm">
        <div class="customer-notice">
            📝 <b>নির্দেশনা:</b> ফর্মটি সঠিক তথ্য দিয়ে পূরণ করে নিচের বাটনে ক্লিক করুন। এটি সরাসরি আমাদের হোয়াটসঅ্যাপে চলে আসবে।
        </div>

        <div class="section-title">পেমেন্ট ডিটেইলস (বিকাশ/নগদ: 01907966882)</div>
        <div class="grid">
            <select id="f_method">
                <option value="বিকাশ">বিকাশ</option>
                <option value="নগদ">নগদ</option>
            </select>
            <input type="text" id="f_lastDigits" placeholder="লাস্ট ৩ ডিজিট বা নাম">
        </div>
        
        <div class="grid">
            <div><label>জার্সি (পিস)</label><input type="number" id="f_qJ" value="1"></div>
            <div><label>প্যান্ট (পিস)</label><input type="number" id="f_qP" value="0"></div>
        </div>
        <div class="grid">
            <input type="text" id="f_name" placeholder="আপনার নাম">
            <input type="text" id="f_phone" placeholder="ফোন নাম্বার">
        </div>
        <div class="section-title">ডিজাইন ডিটেইলস</div>
        <div class="grid">
            <input type="text" id="f_jname" placeholder="পিছনের নাম">
            <input type="text" id="f_jnum" placeholder="নাম্বার">
        </div>
        <div class="grid">
            <input type="text" id="f_size" placeholder="সাইজ">
            <input type="text" id="f_hata" placeholder="হাফ/ফুল হাতা">
        </div>
        <input type="text" id="f_gola" placeholder="গোলার ধরণ (গোল/ভি কলার)">
        
        <div class="section-title">ঠিকানা</div>
        <div class="grid">
            <input type="text" id="f_dist" placeholder="জেলা">
            <input type="text" id="f_thana" placeholder="থানা">
        </div>
        <input type="text" id="f_area" placeholder="এলাকা/মহল্লা">
        
        <label>নোট (লোগো বা কাস্টম ডিজাইন)</label>
        <textarea id="f_note" placeholder="যেমন: সামনে লোগো হবে..." rows="2"></textarea>
        
        <button class="main-btn" onclick="submitToWA()">WhatsApp-এ অর্ডার পাঠান 🚀</button>
    </div>
</div>

<script>
    const MY_PHONE = "8801907966882";
    const PASS = "sahil882";

    function showLogin() { document.getElementById('loginSection').style.display = 'block'; }

    function checkPassword() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('customerForm').style.display = 'none';
            document.getElementById('loginSection').style.display = 'none';
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function showTab(t) {
        document.getElementById('bill').style.display = t=='bill'?'block':'none';
        document.getElementById('calc').style.display = t=='calc'?'block':'none';
        document.getElementById('btn-bill').className = t=='bill'?'nav-btn active':'nav-btn';
        document.getElementById('btn-calc').className = t=='calc'?'nav-btn active':'nav-btn';
    }

    function submitToWA() {
        let msg = `📝 *নতুন অর্ডার ফর্ম*\n\n`;
        msg += `💰 *পেমেন্ট:* ${document.getElementById('f_method').value} (লাস্ট: ${document.getElementById('f_lastDigits').value})\n\n`;
        msg += `◈ কত পিস জার্সি - ${document.getElementById('f_qJ').value}\n`;
        msg += `◈ কত পিস প্যান্ট - ${document.getElementById('f_qP').value}\n`;
        msg += `◈ নাম - ${document.getElementById('f_name').value}\n`;
        msg += `◈ ফোন - ${document.getElementById('f_phone').value}\n\n`;
        msg += `◈ জার্সির নাম - ${document.getElementById('f_jname').value}\n`;
        msg += `◈ জার্সি নাম্বার - ${document.getElementById('f_jnum').value}\n`;
        msg += `◈ সাইজ - ${document.getElementById('f_size').value}\n`;
        msg += `◈ হাতার ধরণ - ${document.getElementById('f_hata').value}\n`;
        msg += `◈ গোলার ধরণ - ${document.getElementById('f_gola').value}\n\n`;
        msg += `◈ জেলা - ${document.getElementById('f_dist').value}\n`;
        msg += `◈ থানা - ${document.getElementById('f_thana').value}\n`;
        msg += `◈ এলাকা - ${document.getElementById('f_area').value}\n\n`;
        msg += `◈ নোট - ${document.getElementById('f_note').value}`;
        
        window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    let history = JSON.parse(localStorage.getItem('jn_history') || '[]');
    function calcBill() {
        const p=parseInt(document.getElementById('b_price').value)||0, q=parseInt(document.getElementById('b_qty').value)||1, d=parseInt(document.getElementById('b_delivery').value)||0, a=parseInt(document.getElementById('b_advance').value)||0;
        if(p>0){document.getElementById('billOutput').style.display='block'; document.getElementById('billResult').innerText=`অর্ডার কনফার্ম!\nমোট: ${p*q+d}৳\nঅ্যাডভান্স: ${a}৳\nবাকি: ${p*q+d-a}৳`;}
    }
    function saveToHistory() {
        const p=parseInt(document.getElementById('b_price').value)||0, q=parseInt(document.getElementById('b_qty').value)||1;
        if(p>0){history.push({d:new Date().toLocaleDateString(), a:p*q}); localStorage.setItem('jn_history', JSON.stringify(history)); alert("সেভ হয়েছে!"); updateHistory();}
    }
    function updateHistory() {
        let t=0; document.getElementById('historyList').innerHTML="";
        history.forEach(i=>{t+=i.a; document.getElementById('historyList').innerHTML+=`<div>${i.d} - ${i.a}৳</div>`;});
        document.getElementById('totalSales').innerText=t;
    }
    updateHistory();
</script>
</body>
</html>
